<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: url('{{ url_for("static", filename="emblem.png") }}') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial;
            color: white;
            text-align: center;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .container {
            padding: 30px;
        }

        /* 🔥 Charts Layout */
        .row {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .chart-container {
            width: 45%;
            height: 300px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* Table */
        table {
            margin: auto;
            margin-top: 40px;
            border-collapse: collapse;
            width: 60%;
            background: rgba(255,255,255,0.1);
        }

        th, td {
            border: 1px solid white;
            padding: 10px;
        }

        th {
            background: rgba(255,255,255,0.2);
        }

    </style>
</head>

<body>

<div class="container">

    <h2>📊 {{ etype.upper() }} Election Results</h2>
    <h3>Total Votes: {{ total }}</h3>

    <!-- Charts -->
    <div class="row">

        <!-- BAR -->
        <div class="chart-container">
            <canvas id="barChart"></canvas>
        </div>

        <!-- PIE -->
        <div class="chart-container">
            <canvas id="pieChart"></canvas>
        </div>

    </div>

    <!-- Table -->
    <table>
        <tr>
            <th>Party</th>
            <th>Votes</th>
        </tr>

        {% for i in range(labels|length) %}
        <tr>
            <td>{{ labels[i] }}</td>
            <td>{{ votes[i] }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

<script>
    var labels = {{ labels|tojson }};
    var votes = {{ votes|tojson }};

    // BAR CHART
    new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Votes',
                data: votes
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    // PIE CHART
    new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: votes
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
</script>

</body>
</html>
