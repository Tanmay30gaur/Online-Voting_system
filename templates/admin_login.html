<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url('{{ url_for("static", filename="emblem2.PNG") }}') no-repeat center center fixed;
            background-size: 60%;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: -1;
        }

        /* Glass Card */
        .glass-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 25px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);

            color: white;
        }

        .glass-card h3 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            box-shadow: none;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .btn-dark {
            margin-top: 15px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="glass-card">

        <h3>🔐 Admin Login</h3>

        <form method="POST">
            <input type="text" name="admin" placeholder="Admin Name" class="form-control mt-3" required>
            <input type="password" name="password" placeholder="Password" class="form-control mt-3" required>

            <button class="btn btn-dark w-100 mt-3">Login</button>
        </form>

    </div>

</body>
</html>
