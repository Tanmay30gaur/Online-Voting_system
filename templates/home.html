<!DOCTYPE html>
<html>
<head>
    <title>Online Voting System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url('{{ url_for("static", filename="bg.jpg") }}') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: -1;
        }

        .glass-card {
            width: 100%;
            max-width: 550px;
            padding: 50px;
            border-radius: 25px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);

            text-align: center;
            color: white;
        }

        /* Professional Disclaimer */
        .footer-disclaimer {
            position: fixed;
            bottom: 15px;
            right: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
            max-width: 420px;
            text-align: right;
        }

        @media (max-width: 768px) {
            .footer-disclaimer {
                left: 15px;
                right: 15px;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div class="glass-card">
        <h2>🗳️ Online Voting System</h2>
        <p>One Vote. One Voice.</p>

        <a href="/choose-election" class="btn btn-success w-100 mt-4">
            Choose Election Type
        </a>

        <a href="/admin-login" class="btn btn-outline-light w-100 mt-3">
            Admin Login
        </a>
    </div>

    <!-- Professional Disclaimer -->
    <div class="footer-disclaimer">
       © 2026 Online Voting System .All voting rights and electoral procedures are governed under the constitutional framework of India and the directives of the Election Commission of India.
    </div>

</body>
</html>
