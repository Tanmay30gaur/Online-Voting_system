<!DOCTYPE html>
<html>
<head>
    <title>Cast Your Vote</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url('{{ url_for("static", filename="emblem.png") }}') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: -1;
        }

        .eci-logo {
            position: fixed;
            top: 20px;
            right: 30px;
        }

        .eci-logo img {
            height: 60px;
        }

        .glass-card {
            width: 100%;
            max-width: 550px;
            padding: 40px;
            border-radius: 25px;

            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);

            color: white;
        }

        .glass-card h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            margin-top: 10px;
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            box-shadow: none;
        }

        .form-select option {
            background: #222;
            color: white;
        }

        .form-text {
            color: #ddd;
        }

        .btn-success {
            margin-top: 20px;
        }

        /* ALERT FIX */
        .alert {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            margin-bottom: 15px;
        }

    </style>
</head>

<body>

    <!-- ECI Logo -->
    <div class="eci-logo">
        <img src="{{ url_for('static', filename='eci_logo.png') }}">
    </div>

    <!-- Form -->
    <div class="glass-card">

        <h2>🗳️ Cast Your Vote</h2>

        <!-- 🔥 FLASH MESSAGE SHOW HERE -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
                {{ message }}
            </div>
          {% endfor %}
        {% endwith %}

        <form method="POST">

            <label>User ID</label>
            <input type="number" name="user_id" class="form-control" required>

            <label>Age</label>
            <input type="number"
                   name="age"
                   class="form-control"
                   required
                   min="18"
                   max="120"
                   oninput="if(this.value.length > 3) this.value = this.value.slice(0,3);">

            <label>Voter ID</label>
            <input type="text"
                name="voter_id"
                maxlength="10"
                class="form-control"
                required
                placeholder="Enter Voter ID"
                oninput="this.value=this.value.toUpperCase()">

            <div class="form-text">
                Enter valid Voter ID (e.g., ABC1234567)
            </div>

            <label>Select Party</label>
            <select name="party" class="form-select" required>

                <option value="" disabled selected>-- Select Party --</option>

                <option value="BJP">BJP</option>
                <option value="INC">INC</option>
                <option value="BSP">BSP</option>
                <option value="CPI">CPI</option>
                <option value="AAP">AAP</option>
                <option value="NOTA">NOTA</option>

            </select>

            <button type="submit" class="btn btn-success w-100">
                Submit Vote
            </button>

        </form>

    </div>

</body>
</html>
